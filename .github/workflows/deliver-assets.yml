name: Deliver PDF assets

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Semantic version label passed to Butler. Defaults to 0.0.1."
        required: false
        type: string
      dry_run:
        description: "Verify and package assets without pushing to itch.io or Permaweb."
        required: false
        default: false
        type: boolean
      skip_itch_and_release:
        description: "Skip GitHub release and itch.io pushes."
        required: false
        default: false
        type: boolean
      permaweb_deploy_scope:
        description: "Permaweb upload scope when dry_run is false."
        required: false
        default: all
        type: choice
        options:
          - none
          - single-column
          - all
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/deliver-assets.yml"
      - "design_bsb.py"
      - "drafts/primary/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "setup.py"
      - "src/**"

permissions:
  contents: write

env:
  ITCH_TARGET: dpshde/crafted-bsb-editions
  PRIMARY_PDF: drafts/primary/bsb-primary-draft.pdf
  SINGLE_COLUMN_PDF: drafts/primary/bsb-single-column-draft.pdf
  RELEASE_BUILD_DIR: dist/bsb-release-build
  RELEASE_PRIMARY_PDF: dist/bsb-release-build/bsb-primary-draft.pdf
  RELEASE_SINGLE_COLUMN_PDF: dist/bsb-release-build/bsb-single-column-draft.pdf
  DEFAULT_RELEASE_VERSION: 0.0.1
  PRIMARY_ASSET_NAME: BSB - Primary Layout.pdf
  SINGLE_COLUMN_ASSET_NAME: BSB - Single Column.pdf
  DRAFT_MANIFEST: drafts/primary/README.md
  DIST_DIR: dist/bsb-pdf-assets
  ARNS_NAME: scripture
  ARNS_UNDERNAME: crafted_bsb
  # Same ARIO process used by dpshde/argo Permaweb deploys.
  ARIO_PROCESS: qNvAoz0TgcH7DMg8BCVn8jF32QH5L6T29VjHxhHqqGE
  PERMAWEB_BUNDLER: https://up.arweave.net
  PERMAWEB_ON_DEMAND_MAX_ARIO: "10.0"

jobs:
  package-and-deliver:
    name: Package and deliver PDF assets
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install verifier dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Verify committed PDF artifacts
        run: python design_bsb.py --qa-only --verify

      - name: Resolve release version
        id: version
        run: |
          if [ -n "${{ inputs.release_version }}" ]; then
            version="${{ inputs.release_version }}"
          else
            version="$DEFAULT_RELEASE_VERSION"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "release_version must be semantic versioning, such as 0.0.1, 0.0.1-beta.1, or 0.0.1+build.1" >&2
            exit 1
          fi

          echo "value=${version}" >> "$GITHUB_OUTPUT"
          echo "pdf_label=Version ${version}" >> "$GITHUB_OUTPUT"

      - name: Build release PDF copies
        run: |
          rm -rf "$RELEASE_BUILD_DIR"
          mkdir -p "$RELEASE_BUILD_DIR"
          cp "$PRIMARY_PDF" "$RELEASE_PRIMARY_PDF"
          cp "$SINGLE_COLUMN_PDF" "$RELEASE_SINGLE_COLUMN_PDF"

          python -m bsb_pdf_toolkit.stamp_release_stage \
            --primary "$RELEASE_PRIMARY_PDF" \
            --single-column "$RELEASE_SINGLE_COLUMN_PDF" \
            --font-dir fonts \
            --release-stage "${{ steps.version.outputs.pdf_label }}"

      - name: Package assets and checksums
        run: |
          rm -rf "$DIST_DIR"
          mkdir -p "$DIST_DIR/primary-fixed-layout" "$DIST_DIR/single-column"

          cp "$RELEASE_PRIMARY_PDF" "$DIST_DIR/primary-fixed-layout/$PRIMARY_ASSET_NAME"
          cp "$DRAFT_MANIFEST" "$DIST_DIR/primary-fixed-layout/README.md"

          cp "$RELEASE_SINGLE_COLUMN_PDF" "$DIST_DIR/single-column/$SINGLE_COLUMN_ASSET_NAME"
          cp "$DRAFT_MANIFEST" "$DIST_DIR/single-column/README.md"

          (
            cd "$DIST_DIR/primary-fixed-layout"
            sha256sum "$PRIMARY_ASSET_NAME" > SHA256SUMS.txt
          )

          (
            cd "$DIST_DIR/single-column"
            sha256sum "$SINGLE_COLUMN_ASSET_NAME" > SHA256SUMS.txt
          )

          cp "$DIST_DIR/primary-fixed-layout/SHA256SUMS.txt" "$DIST_DIR/primary-fixed-layout-SHA256SUMS.txt"
          cp "$DIST_DIR/single-column/SHA256SUMS.txt" "$DIST_DIR/single-column-SHA256SUMS.txt"

      - name: Upload primary fixed-layout PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: berean-standard-bible-primary-fixed-layout-pdf-${{ steps.version.outputs.value }}
          path: ${{ env.DIST_DIR }}/primary-fixed-layout
          if-no-files-found: error

      - name: Upload single-column PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: berean-standard-bible-single-column-pdf-${{ steps.version.outputs.value }}
          path: ${{ env.DIST_DIR }}/single-column
          if-no-files-found: error

      - name: Upload packaged assets to GitHub release
        if: ${{ !inputs.dry_run && !inputs.skip_itch_and_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          tag="v${RELEASE_VERSION}"
          title="BSB PDF assets ${RELEASE_VERSION}"
          notes="Generated BSB PDF assets for version ${RELEASE_VERSION}."

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --target "$GITHUB_SHA" \
              --title "$title" \
              --notes "$notes"
          fi

          gh release upload "$tag" \
            "$DIST_DIR/primary-fixed-layout/$PRIMARY_ASSET_NAME" \
            "$DIST_DIR/single-column/$SINGLE_COLUMN_ASSET_NAME" \
            "$DIST_DIR/primary-fixed-layout-SHA256SUMS.txt" \
            "$DIST_DIR/single-column-SHA256SUMS.txt" \
            --clobber

      - name: Install Butler
        if: ${{ !inputs.dry_run && !inputs.skip_itch_and_release }}
        uses: remarkablegames/setup-butler@v3

      - name: Validate Butler configuration
        if: ${{ !inputs.dry_run && !inputs.skip_itch_and_release }}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          if [ -z "$BUTLER_API_KEY" ]; then
            echo "Missing required repository secret: BUTLER_API_KEY" >&2
            exit 1
          fi

      - name: Push primary fixed-layout PDF to itch.io
        if: ${{ !inputs.dry_run && !inputs.skip_itch_and_release }}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          butler push "$DIST_DIR/primary-fixed-layout/$PRIMARY_ASSET_NAME" "$ITCH_TARGET:primary-fixed-layout-pdf" \
            --userversion "${{ steps.version.outputs.value }}"

      - name: Push single-column PDF to itch.io
        if: ${{ !inputs.dry_run && !inputs.skip_itch_and_release }}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          butler push "$DIST_DIR/single-column/$SINGLE_COLUMN_ASSET_NAME" "$ITCH_TARGET:single-column-pdf" \
            --userversion "${{ steps.version.outputs.value }}"

      - name: Set up Node.js for Permaweb deploy
        if: ${{ !inputs.dry_run && inputs.permaweb_deploy_scope != 'none' }}
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Restore Permaweb dedupe cache
        if: ${{ !inputs.dry_run && inputs.permaweb_deploy_scope != 'none' }}
        uses: actions/cache@v4
        with:
          path: .permaweb-deploy/transaction-cache.json
          key: permaweb-deploy-cache-${{ github.repository }}
          restore-keys: |
            permaweb-deploy-cache-

      - name: Validate Permaweb configuration
        if: ${{ !inputs.dry_run && inputs.permaweb_deploy_scope != 'none' }}
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          if [ -z "$DEPLOY_KEY" ]; then
            echo "Missing required repository secret: DEPLOY_KEY" >&2
            exit 1
          fi
          if [ -z "$ARNS_NAME" ] || [ -z "$ARNS_UNDERNAME" ]; then
            echo "Missing required workflow env: ARNS_NAME and ARNS_UNDERNAME" >&2
            exit 1
          fi

      - name: Upload packaged assets to Permaweb
        if: ${{ !inputs.dry_run && inputs.permaweb_deploy_scope != 'none' }}
        id: permaweb_upload
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          deploy_folder="$DIST_DIR"
          if [ "${{ inputs.permaweb_deploy_scope }}" = "single-column" ]; then
            deploy_folder="$DIST_DIR/single-column"
          fi

          echo "Uploading Permaweb folder: $deploy_folder"
          npx --yes permaweb-deploy@4.0.0 upload \
            --deploy-folder="$deploy_folder" \
            --ario-process="$ARIO_PROCESS" \
            --uploader="$PERMAWEB_BUNDLER" \
            --on-demand ario \
            --max-token-amount "$PERMAWEB_ON_DEMAND_MAX_ARIO" | tee permaweb-upload.log

          manifest_tx="$(grep -Eo 'https://arweave\.net/[A-Za-z0-9_-]+' permaweb-upload.log | tail -1 | sed 's#https://arweave.net/##')"
          if [ -n "$manifest_tx" ]; then
            echo "manifest_tx=$manifest_tx" >> "$GITHUB_OUTPUT"
            echo "Permaweb manifest: https://arweave.net/$manifest_tx"
          fi


